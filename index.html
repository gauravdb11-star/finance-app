<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finance Dashboard</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <div class="container mt-4 login-container">
        <h1>Login</h1>
        <input type="text" id="username" class="form-control mb-2" placeholder="Enter Username">
        <input type="password" id="password" class="form-control mb-2" placeholder="Enter Password">       
        <button class="btn btn-primary" onclick="login()">Login</button>
    </div>

    <script src="assets/js/js.cookie.min.js"></script>
    <script>
        function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (username === "admin" && password === "password123") {
        Cookies.set("loggedIn", "true", { expires: 1 });
        localStorage.setItem("username", username); // ✅ Store username for dashboard
        window.location.href = "dashboard.html"; // ✅ Redirect to Dashboard
    } else {
        alert("Invalid Username or Password");
    }
}
    </script>
</body>
</html>
