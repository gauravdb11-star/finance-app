<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Tables</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/sidebar.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

<div class="sidebar">
    <div class="menu-button-wrapper">
        <button class="menu-button">
            <img src="icons/menu.png" alt="Menu Icon" class="icon"> <span>Menu</span>
        </button>
    </div>

    <ul>
        <li><a href="dashboard.html"><img src="icons/dashboard.png" alt="Dashboard Icon" class="icon"> <span>Dashboard</span></a></li>
		<li><a href="budget.html"><img src="icons/salary.png" alt="Budget Icon" class="icon"> <span>Budget Control</span></a></li>
        <li><a href="transaction.html" class="active"><img src="icons/transactions.png" alt="Transactions Icon" class="icon"> <span>Transaction Tables</span></a></li>
        <li><a href="society.html"><img src="icons/society.png" alt="Society Icon" class="icon"> <span>Society Cutting</span></a></li>
    </ul>

    <div class="upload-section mt-3">
        <h5 id="uploadTrigger">
            <img src="icons/upload.png" alt="Upload Icon" class="icon"> 
            <span class="upload-text">Upload File</span>
        </h5>
        <input type="file" id="excelFile" class="form-control" accept=".xls,.xlsx,.json" style="display: none;" />
    </div>

    <div class="upload-section mt-3">
        <h5 id="backupTrigger">
            <img src="icons/misc.png" alt="Backup Icon" class="icon"> 
            <span class="upload-text">Backup Data</span>
        </h5>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="d-flex justify-content-between align-items-center mb-4 pt-2 pe-3">
        <h2 style="font-weight: 700; color: #AFDDE5;">Transaction Management</h2>
        <div class="text-end">
            <div id="systemDate" style="font-size: 14px; font-weight: bold; color: #0FA4AF;"></div>
            <div id="systemTime" style="font-size: 12px; color: #888;"></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="row gx-2">
            <div class="col-md-6">
                <input type="text" id="tableSearch" class="form-control modern-input" placeholder="Search by name, reason, or narration...">
            </div>
            <div class="col-md-3">
                <select id="tableCategoryFilter" class="form-control modern-input">
                    <option value="">All Categories</option>
                    <option value="Uncategorized">⚠️ Uncategorized Only</option>
                    </select>
            </div>
            <div class="col-md-3">
                <div class="data-counter">
                    Showing: <span id="rowCount" style="color:#0FA4AF; font-weight:bold;">0</span> transactions
                </div>
            </div>
        </div>
    </div>

    <div class="table-wrapper mt-3">
        <table class="modern-table">
            <thead id="tableHeader">
                </thead>
            <tbody id="transactionTable">
                </tbody>
        </table>
    </div>
</div>

    <div class="row align-items-stretch gx-2">
        <div class="card mt-4 w-100">
            <div class="card-body">
                <table class="table table-striped">
                    <thead id="tableHeader"></thead>
                    <tbody id="transactionTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
function updateDateTime() {
    const now = new Date();
    const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
    const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
    document.getElementById("systemDate").textContent = now.toLocaleDateString('en-US', dateOptions);
    document.getElementById("systemTime").textContent = now.toLocaleTimeString('en-US', timeOptions);
}
setInterval(updateDateTime, 1000);
updateDateTime();

// Make Upload Button Work
document.getElementById("uploadTrigger").addEventListener("click", function() {
    document.getElementById("excelFile").click(); 
});

// Make Excel/JSON loading trigger when a file is selected
document.getElementById("excelFile").addEventListener("change", function(event) {
    if (typeof loadExcel === "function") {
        loadExcel(event);
    }
});

// Make Backup Button Work
document.getElementById("backupTrigger").addEventListener("click", function() {
    if (typeof downloadBackup === "function") {
        downloadBackup();
    }
});
</script>
<script src="assets/js/xlsx.full.min.js"></script>
<script src="assets/js/main/transactions.js"></script>
<script src="assets/js/main/app.js"></script>
<script src="assets/js/main/filters.js"></script>
<script src="assets/js/main/profile-btn.js"></script>
<script src="assets/js/js.cookie.min.js"></script>
</body>
</html>
